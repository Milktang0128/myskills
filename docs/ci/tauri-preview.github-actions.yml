# GitHub Actions template.
#
# To activate this workflow, copy this file to
# `.github/workflows/tauri-preview.yml` and push with a GitHub token that has
# the `workflow` scope. The current repository push token cannot create or
# update workflow files.

name: Tauri Preview

on:
  push:
    branches:
      - tauri/refactor-v0.2
  pull_request:
    branches:
      - tauri/refactor-v0.2

jobs:
  parity-check:
    name: Parity check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-24.04, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            sqlite3 \
            xvfb

      - name: Install Windows SQLite CLI
        if: runner.os == 'Windows'
        run: choco install sqlite --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Audit command bridge parity
        run: npm run check:commands

      - name: Rust format
        run: npm run check:rust:fmt

      - name: Rust clippy
        run: npm run check:rust:clippy

      - name: Rust tests
        run: npm run test:rust

      - name: Tauri build
        run: npm run build:tauri

      - name: Packaged fixture smoke
        if: runner.os != 'Linux'
        run: npm run smoke:tauri:launch -- --history-smoke --workflow-smoke

      - name: Packaged fixture smoke (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run smoke:tauri:launch -- --history-smoke --workflow-smoke

      - name: Mounted DMG fixture smoke
        if: runner.os == 'macOS'
        run: npm run smoke:tauri:dmg -- --history-smoke --workflow-smoke
