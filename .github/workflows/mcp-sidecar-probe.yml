name: MCP sidecar signing probe

# THROWAWAY validation workflow. Builds + signs + notarizes the universal macOS
# app WITH the myskills-mcp sidecar (via externalBin), but creates no release —
# it only proves the bundled sidecar gets code-signed and survives notarization
# (the one thing local unsigned builds can't verify). Delete once green.
#
# Run from the Actions tab → "MCP sidecar signing probe" → Run workflow on the
# feat/mcp-server branch.

on:
  workflow_dispatch:

jobs:
  probe:
    name: macOS signed sidecar
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        shell: bash
        run: |
          n=0
          until npm ci; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci failed (transient?) — retry $n/3 in 20s…"
            sleep 20
          done

      - name: Build MCP sidecar (universal)
        run: node scripts/build-mcp-sidecar.mjs universal-apple-darwin

      - name: Build, sign & notarize (no release)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # No tagName → tauri-action only builds (signs + notarizes), no release.
          args: --target universal-apple-darwin --config src-tauri/tauri.stable.conf.json --config src-tauri/tauri.sidecar.conf.json --config src-tauri/tauri.macos.signing.conf.json --config src-tauri/tauri.updater.conf.json

      - name: Verify the sidecar is signed
        shell: bash
        run: |
          set -euo pipefail
          APP=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' | head -1)
          echo "app bundle: $APP"
          ls -la "$APP/Contents/MacOS/"
          test -f "$APP/Contents/MacOS/myskills-mcp" || { echo "::error::sidecar missing from bundle"; exit 1; }
          echo "--- codesign signature on the sidecar ---"
          codesign -dv --verbose=4 "$APP/Contents/MacOS/myskills-mcp" 2>&1 | grep -E 'Authority|Identifier|TeamIdentifier|Runtime|flags' || true
          echo "--- strict verify sidecar + app ---"
          codesign --verify --strict --verbose=2 "$APP/Contents/MacOS/myskills-mcp"
          codesign --verify --strict --deep --verbose=2 "$APP"
          echo "✓ sidecar is signed and the bundle verifies"
