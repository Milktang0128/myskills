name: Release

# Builds signed, notarized stable installers for all three platforms and
# attaches them to a GitHub Release (created as a DRAFT for you to review and
# publish). Triggered by pushing a version tag, e.g.:
#
#     git tag v0.2.0 && git push origin v0.2.0
#
# or manually via the Actions tab (workflow_dispatch, provide the tag).
#
# ── Required repository secrets (Settings → Secrets and variables → Actions) ──
#   macOS code signing + notarization:
#     APPLE_CERTIFICATE            base64 of the exported "Developer ID
#                                  Application" certificate (.p12).
#                                  Keychain Access → export the cert as .p12 →
#                                  `base64 -i cert.p12 | pbcopy`.
#     APPLE_CERTIFICATE_PASSWORD   the password you set on that .p12 export.
#     APPLE_ID                     your Apple ID email.
#     APPLE_PASSWORD               an app-specific password (appleid.apple.com →
#                                  Sign-In and Security → App-Specific Passwords),
#                                  NOT your login password.
#     APPLE_TEAM_ID                LB8ZBRDP63
#   Tauri updater signing (reuse the ones the preview workflow already uses):
#     TAURI_SIGNING_PRIVATE_KEY
#     TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#
# tauri-action imports the cert into a temporary keychain and notarizes the app
# automatically once APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID are present.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (universal)
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar-triple: universal-apple-darwin
            args: --target universal-apple-darwin --config src-tauri/tauri.stable.conf.json --config src-tauri/tauri.sidecar.conf.json --config src-tauri/tauri.macos.signing.conf.json --config src-tauri/tauri.updater.conf.json
          - os: ubuntu-24.04
            label: Linux
            rust-targets: ''
            sidecar-triple: x86_64-unknown-linux-gnu
            args: --config src-tauri/tauri.stable.conf.json --config src-tauri/tauri.sidecar.conf.json --config src-tauri/tauri.updater.conf.json
          - os: windows-latest
            label: Windows
            rust-targets: ''
            sidecar-triple: x86_64-pc-windows-msvc
            args: --config src-tauri/tauri.stable.conf.json --config src-tauri/tauri.sidecar.conf.json --config src-tauri/tauri.updater.conf.json --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        # Retry: package postinstalls fetch binaries from GitHub releases, which
        # intermittently return HTTP 504 on cold runners. Bash works on all three
        # runners (Git Bash on Windows).
        shell: bash
        run: |
          n=0
          until npm ci; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci failed (transient?) — retry $n/3 in 20s…"
            sleep 20
          done

      - name: Build MCP sidecar
        # Produces src-tauri/binaries/myskills-mcp-<triple>[.exe] so Tauri's
        # externalBin (tauri.sidecar.conf.json) can bundle + sign it next to the
        # app binary. macOS builds a universal (lipo'd) sidecar.
        shell: bash
        run: node scripts/build-mcp-sidecar.mjs ${{ matrix.sidecar-triple }}

      - name: Build, sign, notarize & draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (consumed only on the macOS runner)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          releaseName: MySkills ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Gate: prove the just-built macOS bundle is correctly signed, notarized,
      # and stapled before anyone publishes the draft. A real signing defect
      # fails the job here (the same .app/.dmg that tauri-action just uploaded),
      # so a broken artifact never gets promoted to `latest`. (See issue #62 —
      # the reported v0.4.0 artifact actually passed all of these; this gate
      # turns that manual check into a permanent guarantee.)
      - name: Verify macOS signing (codesign / spctl / staple)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          APP="$(find "$BUNDLE/macos" -maxdepth 1 -name '*.app' | head -1)"
          DMG="$(find "$BUNDLE/dmg" -maxdepth 1 -name '*.dmg' | head -1)"
          echo "App: ${APP:-<none>}"
          echo "DMG: ${DMG:-<none>}"
          [ -n "$APP" ] || { echo "::error::no .app bundle found to verify"; exit 1; }

          echo "== identity + hardened runtime =="
          codesign -dvvv "$APP" 2>&1 | grep -E 'Authority=Developer ID Application|flags=.*runtime|TeamIdentifier=' \
            || { echo "::error::missing Developer ID / hardened runtime"; exit 1; }

          echo "== codesign --verify --deep --strict (incl. nested myskills-mcp sidecar) =="
          codesign --verify --deep --strict --verbose=2 "$APP"

          echo "== spctl Gatekeeper assessment (must be Notarized Developer ID) =="
          spctl -a -t exec -vvv "$APP"

          echo "== stapler: the .app must carry its notarization ticket offline =="
          xcrun stapler validate "$APP"

          # Belt-and-suspenders: staple the DMG too and re-upload it, so users who
          # run straight from the mounted image are also covered offline. The .app
          # staple above is the real guarantee, so this is best-effort.
          if [ -n "$DMG" ] && [ -n "${RELEASE_TAG:-}" ]; then
            if xcrun stapler staple "$DMG" && xcrun stapler validate "$DMG"; then
              echo "Re-uploading stapled DMG to the draft release…"
              gh release upload "$RELEASE_TAG" "$DMG" --clobber --repo "$GITHUB_REPOSITORY"
            else
              echo "DMG stapling skipped (no standalone ticket) — the stapled .app is sufficient."
            fi
          fi
          echo "✅ macOS signing verified (signed · notarized · stapled)"
